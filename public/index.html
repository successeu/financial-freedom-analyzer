<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Freedom Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen p-6">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- FORM SECTION -->
        <div id="formSection" class="block">
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-white mb-2">Financial Freedom Analyzer</h1>
                <p class="text-slate-300">Complete your profile to get your personalized 90-day plan</p>
            </div>

            <div class="bg-slate-800/50 border border-slate-700 rounded-2xl p-8">
                <div id="step-0" class="step-content">
                    <h3 class="text-xl font-bold text-white mb-4">Step 1: Contact Information</h3>
                    <input type="text" id="firstName" placeholder="First Name" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                    <input type="text" id="lastName" placeholder="Last Name" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                    <input type="email" id="email" placeholder="Email *" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                    <input type="tel" id="phone" placeholder="Phone" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                </div>

                <div id="step-1" class="step-content hidden">
                    <h3 class="text-xl font-bold text-white mb-4">Step 2: Income & Expenses</h3>
                    <input type="number" id="monthlyIncome" placeholder="Monthly Income ($) *" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                    <input type="number" id="monthlyExpenses" placeholder="Monthly Expenses ($) *" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                    <textarea id="incomeStreams" placeholder="Income Sources..." class="w-full px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" rows="2"></textarea>
                </div>

                <div id="step-2" class="step-content hidden">
                    <h3 class="text-xl font-bold text-white mb-4">Step 3: Current Position</h3>
                    <input type="number" id="currentSavings" placeholder="Current Savings ($) *" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                    <input type="number" id="debt" placeholder="Total Debt ($)" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                </div>

                <div id="step-3" class="step-content hidden">
                    <h3 class="text-xl font-bold text-white mb-4">Step 4: Financial Goals</h3>
                    <input type="text" id="financialGoal" placeholder="Main Financial Goal *" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                    <input type="text" id="timeframe" placeholder="Timeline (e.g., 2 years) *" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg" required>
                </div>

                <div id="step-4" class="step-content hidden">
                    <h3 class="text-xl font-bold text-white mb-4">Step 5: Investment Profile</h3>
                    <select id="investmentExperience" class="w-full mb-3 px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                        <option value="">Select Investment Experience *</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                    <select id="riskTolerance" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 text-white rounded-lg">
                        <option value="">Select Risk Tolerance *</option>
                        <option value="Low">Low</option>
                        <option value="Moderate">Moderate</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div id="errorMessage" class="hidden mt-4 p-3 bg-red-900/30 border border-red-600 text-red-200 rounded-lg"></div>
            </div>

            <div class="flex gap-4 mt-6">
                <button onclick="previousStep()" class="flex-1 px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white font-semibold rounded-lg">Previous</button>
                <button onclick="nextStep()" id="nextBtn" class="flex-1 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg">Next</button>
            </div>
        </div>

        <!-- RESULTS SECTION -->
        <div id="resultsSection" class="hidden">
            <div class="bg-gradient-to-r from-green-900/30 to-blue-900/30 border border-green-700 rounded-2xl p-8">
                <h2 class="text-3xl font-bold text-white mb-6">✅ Your 90-Day Financial Freedom Plan</h2>
                <div class="bg-slate-800/50 p-6 rounded-lg border border-slate-700 mb-6">
                    <div id="analysisText" class="text-slate-300 whitespace-pre-wrap text-sm leading-relaxed"></div>
                </div>
                <button onclick="location.reload()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg">Submit Another</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 0;

        function getFormData() {
            return {
                email: document.getElementById('email').value,
                firstName: document.getElementById('firstName').value || 'User',
                lastName: document.getElementById('lastName').value || '',
                phone: document.getElementById('phone').value || '',
                monthlyIncome: document.getElementById('monthlyIncome').value,
                monthlyExpenses: document.getElementById('monthlyExpenses').value,
                currentSavings: document.getElementById('currentSavings').value,
                debt: document.getElementById('debt').value || '0',
                incomeStreams: document.getElementById('incomeStreams').value || '',
                financialGoal: document.getElementById('financialGoal').value,
                timeframe: document.getElementById('timeframe').value,
                investmentExperience: document.getElementById('investmentExperience').value,
                riskTolerance: document.getElementById('riskTolerance').value
            };
        }

        function showStep(step) {
            document.querySelectorAll('.step-content').forEach((el, idx) => {
                el.classList.toggle('hidden', idx !== step);
            });

            const nextBtn = document.getElementById('nextBtn');
            if (step === 4) {
                nextBtn.textContent = 'Generate Plan';
                nextBtn.onclick = submitForm;
            } else {
                nextBtn.textContent = 'Next';
                nextBtn.onclick = nextStep;
            }

            currentStep = step;
        }

        function nextStep() {
            if (currentStep < 4) {
                showStep(currentStep + 1);
            }
        }

        function previousStep() {
            if (currentStep > 0) {
                showStep(currentStep - 1);
            }
        }

        async function submitForm() {
            const data = getFormData();

            // Validation
            if (!data.email || !data.monthlyIncome || !data.monthlyExpenses || !data.currentSavings) {
                document.getElementById('errorMessage').textContent = '⚠️ Please fill all required fields';
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            try {
                // Submit to backend
                const response = await fetch('/api/submit-form', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                // Generate personalized plan
                const plan = generatePersonalizedPlan(data);

                // Display results
                document.getElementById('analysisText').textContent = plan;
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.remove('hidden');

            } catch (err) {
                document.getElementById('errorMessage').textContent = '⚠️ Error: ' + err.message;
                document.getElementById('errorMessage').classList.remove('hidden');
            }
        }

        // Initialize
        showStep(0);

        function generatePersonalizedPlan(data) {
            const income = parseInt(data.monthlyIncome);
            const expenses = parseInt(data.monthlyExpenses);
            const surplus = income - expenses;
            const savings = parseInt(data.currentSavings);
            const debt = parseInt(data.debt || 0);
            const experience = data.investmentExperience;
            const riskTolerance = data.riskTolerance;
            const goal = data.financialGoal;
            const timeframe = data.timeframe;

            // Determine profile type
            let profileType = 'balanced';
            if (surplus < 500) profileType = 'tight';
            else if (surplus > 2000) profileType = 'strong';

            let debtStatus = 'manageable';
            if (debt > income * 3) debtStatus = 'high';
            else if (debt === 0) debtStatus = 'clear';

            let savingsLevel = 'building';
            if (savings < 3000) savingsLevel = 'starting';
            else if (savings > 30000) savingsLevel = 'solid';

            // Build personalized plan
            let plan = `# Your 90-Day Financial Freedom Plan

## Your Financial Profile
- Name: ${data.firstName} ${data.lastName}
- Email: ${data.email}
- Monthly Income: $${income.toLocaleString()}
- Monthly Expenses: $${expenses.toLocaleString()}
- Monthly Surplus: $${surplus.toLocaleString()}
- Current Savings: $${savings.toLocaleString()}
- Total Debt: $${debt.toLocaleString()}
- Investment Experience: ${experience}
- Risk Tolerance: ${riskTolerance}

## Your Goal
${goal} within ${timeframe}

---

## Phase 1: ASSESS (Days 1-30)
Understand your unique financial position

### Key Actions for Your Situation:`;

            // Customize Phase 1 based on profile
            if (debtStatus === 'high') {
                plan += `
- Create detailed debt inventory (creditor, balance, interest rate)
- Identify which debts are costing you the most
- Calculate debt-to-income ratio
- Document minimum monthly debt payments`;
            } else if (debtStatus === 'clear') {
                plan += `
- Assess current asset allocation
- Review income sources for growth potential
- Calculate your current net worth
- Identify wealth-building opportunities`;
            } else {
                plan += `
- Complete comprehensive financial audit
- Map all income sources and expenses
- Review debt repayment timeline
- Identify optimization opportunities`;
            }

            if (profileType === 'tight') {
                plan += `
- Find ${Math.ceil(expenses * 0.1)} in monthly savings
- Identify discretionary spending to cut
- Document essential vs. non-essential expenses`;
            } else if (profileType === 'strong') {
                plan += `
- Analyze investment readiness
- Review emergency fund adequacy ($${Math.round(expenses * 3).toLocaleString()} target)
- Plan wealth acceleration strategy`;
            }

            plan += `

### Milestone:
- Day 30: Complete financial inventory and identify top 3 priorities

---

## Phase 2: DESIGN (Days 31-60)
Create your personalized strategy

### Cost Optimization:`;

            if (profileType === 'tight') {
                plan += `
- Reduce expenses by $${Math.round(surplus * 0.5).toLocaleString()} using 50/30/20 budget
- Negotiate recurring bills (phone, insurance, subscriptions)
- Find $${Math.round(expenses * 0.05).toLocaleString()} in quick wins`;
            } else {
                plan += `
- Review and optimize major expense categories
- Target $${Math.round(surplus * 0.3).toLocaleString()} in annual savings
- Implement subscription audit`;
            }

            plan += `

### Income Growth:`;

            if (experience === 'Beginner') {
                plan += `
- Research side income matching your skills
- Identify $${Math.round(income * 0.1).toLocaleString()} additional monthly income opportunity
- Start small with skill-based freelancing`;
            } else if (experience === 'Advanced') {
                plan += `
- Explore investment income strategies
- Evaluate business opportunities aligned with expertise
- Plan for $${Math.round(income * 0.2).toLocaleString()} additional monthly income`;
            } else {
                plan += `
- Identify skill advancement opportunities
- Research income increase options (raise, promotion, side work)
- Target $${Math.round(income * 0.15).toLocaleString()} additional monthly income`;
            }

            plan += `

### Savings & Investment:`;

            if (riskTolerance === 'Low') {
                plan += `
- Set up automatic transfers of $${Math.round(surplus * 0.5).toLocaleString()} to savings
- Explore low-risk bonds and stable accounts
- Build 6-month emergency fund (${Math.round(expenses * 6).toLocaleString()})`;
            } else if (riskTolerance === 'High') {
                plan += `
- Allocate $${Math.round(surplus * 0.6).toLocaleString()} to diversified portfolio
- Research stock market ETFs and index funds
- Consider growth-oriented investments`;
            } else {
                plan += `
- Set up balanced portfolio with $${Math.round(surplus * 0.5).toLocaleString()} monthly investment
- Mix conservative (60%) and growth (40%) allocations
- Review quarterly performance`;
            }

            plan += `

### Debt Strategy:`;

            if (debtStatus === 'high') {
                plan += `
- Apply extra $${Math.round(surplus * 0.5).toLocaleString()} to highest interest debt
- Negotiate lower rates on major debts
- Project debt-free date`;
            } else if (debtStatus === 'clear') {
                plan += `
- Focus on wealth building instead of debt repayment
- Explore investment opportunities
- Plan asset diversification`;
            } else {
                plan += `
- Maintain current debt payments
- Allocate additional surplus to investments
- Plan debt payoff acceleration`;
            }

            plan += `

### Milestone:
- Day 60: Systems in place for income, expenses, and savings

---

## Phase 3: ACHIEVE (Days 61-90)
Implementation and momentum building

### Weekly Actions:
- Track progress against targets
- Monitor spending and income
- Adjust strategy based on results`;

            if (profileType === 'tight') {
                plan += `
- Weekly budget review meetings
- Daily expense tracking
- Celebrate small wins`;
            } else if (profileType === 'strong') {
                plan += `
- Portfolio performance review
- Tax optimization analysis
- Wealth building acceleration planning`;
            } else {
                plan += `
- Balanced progress check
- Savings rate review
- Adjustment planning`;
            }

            plan += `

### Month 3 Goals:
- Achieve $${Math.round(surplus * 3).toLocaleString()} additional savings
- Implement at least 2 new income strategies
- Reduce debt by $${Math.round(debt * 0.05).toLocaleString()} (if applicable)
- Establish consistent investment routine

### Beyond 90 Days:
- Evaluate progress toward "${goal}"
- Plan next 90-day sprint
- Scale what's working
- Adjust what isn't

---

## Success Metrics for Your Plan:
✓ Savings Rate: Target $${Math.round(surplus).toLocaleString()}/month
✓ Debt Reduction: ${debtStatus === 'high' ? `Target $${Math.round(debt * 0.1).toLocaleString()} reduction` : 'Maintain current trajectory'}
✓ Income Growth: Target $${Math.round(income * 0.1).toLocaleString()} additional
✓ Emergency Fund: Target $${Math.round(expenses * 3).toLocaleString()}
✓ Investment Rate: Target $${Math.round(surplus * 0.4).toLocaleString()}

---

## Personalized Recommendations:
Profile: ${profileType.toUpperCase()} (Surplus: $${surplus.toLocaleString()}/month)
Debt Level: ${debtStatus.toUpperCase()}
Savings Level: ${savingsLevel.toUpperCase()}
Experience: ${experience.toUpperCase()}

Your data has been synced to Active Campaign for personalized follow-up and support.`;

            return plan;
        }
    </script>
</body>
</html>
